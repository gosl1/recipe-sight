<!-- This html file is for the inventory page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="../styles/inventory_recipesight.css">
</head>
<body class="inventoryPage">



<div class="inventoryContainer">
    <h1 class="inventoryTitle">My Inventory</h1>

    <div class="inventoryGrid">

        <div class="inventoryCard">
            <h3>Chicken Breast</h3>
            <p>Quantity: 2kg</p>

            <div class="inventoryButtons">
                <button>Edit</button>
                <button>Delete</button>
            </div>
        </div>

        <div class="inventoryCard">
            <h3>Garlic</h3>
            <p>Quantity: 5 pcs</p>

            <div class="inventoryButtons">
                <button>Edit</button>
                <button>Delete</button>
            </div>
        </div>

    </div>
</div>

</body>
</html>
