    <script>
        async function searchRecipes() {
            const recipeName = document.getElementById('recipeNameInput').value;
            const cuisine = document.getElementById('recipeCuisineInput').value;
            const ingredient = document.getElementById('recipeIngredientsInput').value;
            
            let url = '../database/search_recipes.php?';
            
            if (recipeName) {
                url += `type=name&query=${encodeURIComponent(recipeName)}`;
            } else if (cuisine) {
                url += `type=cuisine&query=${encodeURIComponent(cuisine)}`;
            } else if (ingredient) {
                url += `type=ingredient&query=${encodeURIComponent(ingredient)}`;
            } else {
                url += 'type=all';
            }
            
            const response = await fetch(url);
            const recipes = await response.json();
            
            let html = '<h2>Search Results</h2>';
            if (recipes.length === 0) {
                html += '<p>No recipes found.</p>';
            } else {
                recipes.forEach(recipe => {
                    html += `
                        <div class="recipe-card">
                            <h3>${recipe.title}</h3>
                            <p>${recipe.description || 'No description'}</p>
                            <a href="recipe.php?id=${recipe.recipe_id}">View Recipe</a>
                        </div>
                    `;
                });
            }
            document.getElementById('searchResults').innerHTML = html;
        }
    </script>
